<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Metro Group — Farvision ERP Training</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    background: #050810;
    background-image:
      radial-gradient(ellipse at 20% 20%, rgba(139,26,26,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(59,130,246,0.05) 0%, transparent 50%);
  }
  .card {
    background: #111827;
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 20px;
    padding: 44px 40px;
    width: 100%;
    max-width: 460px;
    position: relative;
    box-shadow: 0 4px 40px rgba(0,0,0,0.6), 0 0 40px rgba(201,162,39,0.05);
  }
  .card::before {
    content: '';
    position: absolute;
    top: -1px; left: 50%;
    transform: translateX(-50%);
    width: 60%; height: 1px;
    background: linear-gradient(90deg, transparent, #c9a227, transparent);
  }
  .header { text-align: center; margin-bottom: 36px; }
  .brand { font-size: 12px; font-weight: 700; letter-spacing: 3px; color: #c9a227; text-transform: uppercase; margin-bottom: 12px; }
  .title { font-size: 26px; font-weight: 800; color: #f1f5f9; margin-bottom: 6px; letter-spacing: -0.5px; }
  .subtitle { font-size: 13px; color: #94a3b8; line-height: 1.5; }
  .field { margin-bottom: 20px; }
  .field label { display: block; font-size: 11px; font-weight: 600; color: #94a3b8; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.6px; }
  .field input { width: 100%; padding: 13px 16px; background: #0f1628; border: 1px solid rgba(255,255,255,0.12); border-radius: 10px; font-size: 15px; color: #f1f5f9; font-family: inherit; outline: none; transition: border-color 0.2s, box-shadow 0.2s; }
  .field input:focus { border-color: #c9a227; box-shadow: 0 0 0 3px rgba(201,162,39,0.12); }
  .field input::placeholder { color: #475569; }
  .btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #c9a227, #a07d1a); color: #000; border: none; border-radius: 10px; font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 10px; }
  .btn:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(201,162,39,0.35); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
  .spinner { width: 18px; height: 18px; border: 2px solid rgba(0,0,0,0.3); border-top-color: #000; border-radius: 50%; animation: spin 0.6s linear infinite; display: none; }
  .spinner.show { display: block; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); border-radius: 10px; padding: 12px 16px; font-size: 13px; color: #f87171; margin-bottom: 18px; display: none; line-height: 1.5; }
  .error.show { display: block; }
  .divider { border: none; border-top: 1px solid rgba(255,255,255,0.07); margin: 24px 0; }
  .info-row { display: flex; align-items: center; gap: 8px; font-size: 12px; color: #475569; margin-bottom: 8px; }
  .info-dot { width: 6px; height: 6px; border-radius: 50%; background: #c9a227; flex-shrink: 0; }
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <div class="brand">Metro Ignite</div>
    <div class="title">Employee Training Portal</div>
    <div class="subtitle">Login with your Employee ID and password<br>provided by HR on your joining day</div>
  </div>
  <div class="error" id="err"></div>
  <div class="field">
    <label>Employee ID</label>
    <input type="text" id="emp-id" placeholder="e.g. EMP001" autocomplete="username" autofocus/>
  </div>
  <div class="field">
    <label>Password</label>
    <input type="password" id="emp-pwd" placeholder="Enter your password" autocomplete="current-password"/>
  </div>
  <button class="btn" id="login-btn" onclick="doLogin()">
    <span id="btn-text">Access My Training →</span>
    <div class="spinner" id="spinner"></div>
  </button>
  <hr class="divider">
  <div class="info-row"><div class="info-dot"></div>Don't have credentials? Contact your HR department.</div>
  <div class="info-row"><div class="info-dot"></div>Default password: your Employee ID + @Metro</div>
  <div class="info-row"><div class="info-dot"></div>Example: ID = EMP001 → Password = EMP001@Metro</div>
</div>
<script>
  const API = '';
  function showErr(msg){ const e=document.getElementById('err'); e.textContent=msg; e.classList.add('show'); }
  function hideErr(){ document.getElementById('err').classList.remove('show'); }
  function setLoad(on){
    document.getElementById('login-btn').disabled=on;
    document.getElementById('btn-text').textContent=on?'Verifying…':'Access My Training →';
    on?document.getElementById('spinner').classList.add('show'):document.getElementById('spinner').classList.remove('show');
  }
  async function doLogin(){
    hideErr();
    const emp_id=document.getElementById('emp-id').value.trim().toUpperCase();
    const password=document.getElementById('emp-pwd').value;
    if(!emp_id){showErr('Please enter your Employee ID.');return;}
    if(!password){showErr('Please enter your password.');return;}
    setLoad(true);
    try{
      const res=await fetch(API+'/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({emp_id,password})});
      const data=await res.json();
      if(!res.ok||data.error){showErr(data.error||'Login failed. Please try again.');return;}
      localStorage.setItem('mg_token',data.token);
      localStorage.setItem('mg_user',JSON.stringify(data.user));
      window.location.href='/app';
    }catch(e){
      showErr('Cannot connect to server. Make sure the backend is running.');
    }finally{setLoad(false);}
  }
  document.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
  const t=localStorage.getItem('mg_token');
  if(t){fetch('/api/auth/verify',{headers:{'Authorization':'Bearer '+t}}).then(r=>r.json()).then(d=>{if(d.valid&&!d.user.isAdmin)window.location.href='/app';}).catch(()=>localStorage.removeItem('mg_token'));}
</script>
</body>
</html>
